name: Download YouTube Videos

on:
  push:
    paths: ["videos.json"]
  workflow_dispatch:

concurrency:
  group: youtube-download
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Deno (JavaScript runtime for yt-dlp)
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install yt-dlp
        run: |
          pip install --upgrade yt-dlp
          yt-dlp --version

      - name: Write cookies file
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        run: |
          if [ -n "$YOUTUBE_COOKIES" ]; then
            echo "$YOUTUBE_COOKIES" > /tmp/yt-cookies.txt
            echo "COOKIES_FILE=/tmp/yt-cookies.txt" >> $GITHUB_ENV
            echo "✓ Cookies file configured"
          else
            echo "⚠ No cookies provided - downloads may be rate-limited"
          fi

      - name: Test yt-dlp configuration
        run: |
          echo "Testing yt-dlp with Deno and remote EJS components..."
          yt-dlp --js-runtimes deno --remote-components ejs:npm --simulate \
            "https://www.youtube.com/watch?v=jNQXAC9IVRw" 2>&1 | tee test.log
          
          if grep -q "n challenge" test.log; then
            echo "❌ Challenge solving failed"
            exit 1
          fi
          echo "✓ Test successful"

      - name: Process pending videos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python scripts/process.py

      - name: Commit updated videos.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add videos.json
          git diff --staged --quiet || \
            git commit -m "chore: update download statuses [skip ci]" && \
            git push
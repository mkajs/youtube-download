name: Download YouTube Videos

on:
  push:
    paths: ["videos.json"]
  workflow_dispatch:

concurrency:
  group: youtube-download
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true  # Enable Git LFS for large files

      - name: Configure Git LFS
        run: |
          git lfs track "*.mp4"
          git lfs track "*.zip"
          git lfs track "*.part*"
          git config lfs.concurrenttransfers 10
          git add .gitattributes

      - name: Install Deno (JavaScript runtime for yt-dlp)
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install yt-dlp
        run: |
          pip install --upgrade yt-dlp
          yt-dlp --version

      - name: Write cookies file (Proper Netscape format)
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        run: |
          if [ -n "$YOUTUBE_COOKIES" ]; then
            echo "# Netscape HTTP Cookie File" > /tmp/yt-cookies.txt
            echo "# https://curl.haxx.se/rfc/cookie_spec.html" >> /tmp/yt-cookies.txt
            echo "# This is a generated file! Do not edit." >> /tmp/yt-cookies.txt
            echo "" >> /tmp/yt-cookies.txt
            echo "$YOUTUBE_COOKIES" >> /tmp/yt-cookies.txt
            echo "COOKIES_FILE=/tmp/yt-cookies.txt" >> $GITHUB_ENV
            echo "✓ Cookies configured"
          else
            echo "⚠ No cookies provided"
          fi

      - name: Test yt-dlp with cookies
        run: |
          if [ -f "$COOKIES_FILE" ]; then
            yt-dlp --cookies "$COOKIES_FILE" \
              --js-runtimes deno \
              --remote-components ejs:npm \
              --simulate \
              "https://www.youtube.com/watch?v=jNQXAC9IVRw"
            echo "✅ Test successful"
          fi

      - name: Process pending videos (store in repo)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python scripts/process.py

      - name: Push videos to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Pull latest changes first
          git pull --rebase origin ${{ github.ref_name }} || true
          
          # Add all video files
          git add videos/ *.mp4 *.zip .gitattributes
          
          # Commit if there are changes
          if ! git diff --staged --quiet; then
            git commit -m "chore: add downloaded videos [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
            echo "✅ Videos pushed to repository"
          else
            echo "No new videos to commit"
          fi

      - name: Update videos.json statuses
        run: |
          git add videos.json
          git diff --staged --quiet || \
            git commit -m "chore: update download statuses [skip ci]" && \
            git push